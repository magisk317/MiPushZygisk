name: Build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d

      - name: Build module
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: ./build.sh

      - name: Upload artifact (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: mipush-zygisk-arm64-v8a
          path: build/arm64-v8a_*.zip

      - name: Upload artifact (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: mipush-zygisk-armeabi-v7a
          path: build/armeabi-v7a_*.zip

      - name: Upload artifact (x86)
        uses: actions/upload-artifact@v4
        with:
          name: mipush-zygisk-x86
          path: build/x86_*.zip

      - name: Upload artifact (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: mipush-zygisk-x86_64
          path: build/x86_64_*.zip

      - name: Upload artifact (universal)
        uses: actions/upload-artifact@v4
        with:
          name: mipush-zygisk-universal
          path: build/universal_*.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.zip
